<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bot Settings</title>
    <!-- Load the Telegram Web App bridge -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            margin: 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .highlight-box {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 2px solid var(--tg-theme-button-color, #3390ec);
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--tg-theme-hint-color, #888888);
        }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 8px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            font-weight: 400;
            color: var(--tg-theme-text-color, #000);
        }
        .checkbox-label input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="form-group highlight-box">
        <label for="chat_selector" style="color: var(--tg-theme-button-color, #3390ec);">Chat to configure:</label>
        <select id="chat_selector" style="font-weight: bold; border-color: transparent; background-color: transparent; outline: none; padding: 5px 0;"></select>
    </div>

    <div class="form-group">
        <label for="trigger">Bot name / trigger word</label>
        <input type="text" id="trigger" placeholder="Example: Alice">
    </div>

    <div class="form-group">
        <label for="mood">Bot mood</label>
        <input type="text" id="mood" placeholder="Example: very sarcastic">
    </div>

    <div class="form-group">
        <label for="prompt">Additional system prompt</label>
        <textarea id="prompt" placeholder="Any extra instructions..."></textarea>
    </div>

    <div class="form-group">
        <label for="max_tokens">Response limit (tokens)</label>
        <input type="number" id="max_tokens" value="4096">
    </div>

    <div class="form-group">
        <label>Voice reply (Silero TTS)</label>
        <select id="voice">
            <option value="false">Disabled</option>
            <option value="kseniya">Kseniya (Female 1)</option>
            <option value="xenia">Xenia (Female 2)</option>
            <option value="baya">Baya (Female 3)</option>
            <option value="aidar">Aidar (Male 1)</option>
            <option value="eugene">Eugene (Male 2)</option>
            <option value="random">Random voice</option>
        </select>
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" id="syntax"> Enable syntax correction
        </label>
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" id="random_questions"> Allow random prompts
        </label>
    </div>

    <div class="form-group">
        <label for="random_question_prob">Random question probability (0 to 1)</label>
        <input type="number" id="random_question_prob" step="0.001" min="0" max="1" placeholder="Example: 0.05">
    </div>

    <div class="form-group">
        <label for="random_participation_prob">Random participation probability (0 to 1)</label>
        <input type="number" id="random_participation_prob" step="0.001" min="0" max="1" placeholder="Example: 0.1">
    </div>
    
    <div class="form-group" style="margin-top: 24px;">
        <button id="reset_btn" style="background-color: var(--tg-theme-destructive-text-color, #ff3b30); color: #fff; width: 100%; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
            Reset chat settings
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const urlParams = new URLSearchParams(window.location.search);
        let config = { current: null, chats: [] };
        if (urlParams.has('config')) {
            try { config = JSON.parse(urlParams.get('config')); } catch(e) {}
        }
        const chatSelector = document.getElementById('chat_selector');
        if (config.chats && config.chats.length > 0) {
            config.chats.forEach(chat => {
                let opt = document.createElement('option');
                opt.value = chat.id; opt.textContent = chat.title; chatSelector.appendChild(opt);
            });
            if (config.current) chatSelector.value = config.current;
        } else {
            let opt = document.createElement('option');
            opt.textContent = "Refresh the bot menu"; chatSelector.appendChild(opt);
        }
        function loadChatSettings(chatId) {
            const chat = config.chats.find(c => c.id == chatId);
            if (!chat) return;
            document.getElementById('trigger').value = chat.tw || "Нука";
            document.getElementById('mood').value = chat.md || "";
            document.getElementById('prompt').value = chat.ep || "";
            document.getElementById('max_tokens').value = chat.mt || 4096;
            document.getElementById('voice').value = chat.vr || "false";
            document.getElementById('syntax').checked = chat.cs === true;
        }
        if (config.chats.length > 0) loadChatSettings(chatSelector.value);
        chatSelector.addEventListener('change', function() { loadChatSettings(this.value); });
        tg.MainButton.text = "SAVE"; tg.MainButton.show();
        document.getElementById('reset_btn').addEventListener('click', function() {
            tg.showConfirm("Reset the selected chat settings to defaults?", function(c) {
                if (c) tg.sendData(JSON.stringify({ action: "reset", chat_id: chatSelector.value }));
            });
        });
        tg.onEvent('mainButtonClicked', function() {
            let voiceVal = document.getElementById("voice").value;
            if (voiceVal === "false") voiceVal = false;
            tg.sendData(JSON.stringify({
                chat_id: chatSelector.value,
                trigger_word: document.getElementById("trigger").value || "Нука",
                mood: document.getElementById("mood").value,
                extra_prompt: document.getElementById("prompt").value,
                max_tokens: document.getElementById("max_tokens").value || 4096,
                voice_response: voiceVal,
                check_syntax: document.getElementById("syntax").checked
            }));
        });
    </script>
</body>
</html>
